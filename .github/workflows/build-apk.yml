name: Build Adpulse APK

on:
  push:
    branches: [master]
    paths:
      - 'twa-manifest.json'
      - 'manifest.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      - name: Configure Bubblewrap SDK paths
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Generate keystore (if not cached)
        run: |
          if [ ! -f android.keystore ]; then
            keytool -genkeypair \
              -v \
              -keystore android.keystore \
              -alias adpulse \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -dname "CN=Adpulse Industries, OU=Engineering, O=Adpulse, L=Mombasa, S=Coast, C=KE"
          fi

      - name: Init TWA project
        run: |
          bubblewrap init \
            --manifest https://adpulse-ltd.vercel.app/manifest.json \
            --directory twa-build
        env:
          BUBBLEWRAP_SKIP_JDK_CHECK: "1"

      - name: Build APK
        working-directory: twa-build
        run: |
          bubblewrap build \
            --skipPwaValidation
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Copy APK to public/
        run: |
          find twa-build -name "*.apk" | head -1 | xargs -I{} cp {} public/adpulse.apk
          echo "APK size: $(du -sh public/adpulse.apk)"

      - name: Commit APK to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/adpulse.apk
          git diff --staged --quiet || git commit -m "ci: update adpulse.apk build"
          git push
